services:
  certstream:
    build:
      context: ./certstream
      dockerfile: Dockerfile
    container_name: certstream
    restart: unless-stopped
    volumes:
      - certstream-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - dnsstudy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ct-stream-filter:
    build:
      context: ./ct-stream-filter
      dockerfile: Dockerfile
    container_name: ct-stream-filter
    restart: unless-stopped
    env_file: .env
    environment:
      - CERTSTREAM_WS_URL=${CERTSTREAM_WS_URL:-ws://certstream:8080/}
      - POSTGRES_HOST=${POSTGRES_HOST:-dnsstudy-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-dnsstudy}
      - POSTGRES_USER=${POSTGRES_USER:-dnsstudy}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DNSSTUDY_API_URL=${DNSSTUDY_API_URL:-http://dnsstudy-api:8000}
      - PATTERN_RELOAD_INTERVAL=${PATTERN_RELOAD_INTERVAL:-300}
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-60}
    depends_on:
      certstream:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - dnsstudy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ct-watcher:
    build:
      context: ./ct-watcher
      dockerfile: Dockerfile
    container_name: ct-watcher
    restart: unless-stopped
    env_file: .env
    environment:
      - DNSSTUDY_API_URL=${DNSSTUDY_API_URL:-http://dnsstudy-api:8000}
      - WATCHLIST_REFRESH_INTERVAL=${WATCHLIST_REFRESH_INTERVAL:-300}
    volumes:
      - certspotter-state:/var/lib/certspotter
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - dnsstudy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  certstream-data:
  certspotter-state:

networks:
  dnsstudy-network:
    external: true
