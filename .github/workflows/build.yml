name: Build & Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/dnsstudy-ctmonitor

jobs:
  build-certstream:
    name: Build certstream
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push certstream
        uses: docker/build-push-action@v6
        with:
          context: ./certstream
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/certstream:latest
            ${{ env.IMAGE_PREFIX }}/certstream:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ct-stream-filter:
    name: Build ct-stream-filter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ct-stream-filter
        uses: docker/build-push-action@v6
        with:
          context: ./ct-stream-filter
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/ct-stream-filter:latest
            ${{ env.IMAGE_PREFIX }}/ct-stream-filter:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ct-watcher:
    name: Build ct-watcher
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ct-watcher
        uses: docker/build-push-action@v6
        with:
          context: ./ct-watcher
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/ct-watcher:latest
            ${{ env.IMAGE_PREFIX }}/ct-watcher:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: [build-certstream, build-ct-stream-filter, build-ct-watcher]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_DIR="${DEPLOY_DIR:-$HOME/DNSStudy-CTMonitor}"

            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "--- First deploy: cloning repo ---"
              git clone https://github.com/bkeitht/DNSStudy-CTMonitor.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git pull origin main

            # Create .env from example if missing
            if [ ! -f .env ]; then
              echo "--- Creating .env from .env.example ---"
              cp .env.example .env
            fi

            # Ensure docker network exists
            docker network create dnsstudy-network 2>/dev/null || true

            docker compose build
            docker compose up -d
            echo "--- Health check ---"
            sleep 10
            docker compose ps
