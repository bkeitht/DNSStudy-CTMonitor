name: Build & Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/dnsstudy-ctmonitor

jobs:
  build-certstream:
    name: Build certstream
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push certstream
        uses: docker/build-push-action@v6
        with:
          context: ./certstream
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/certstream:latest
            ${{ env.IMAGE_PREFIX }}/certstream:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ct-stream-filter:
    name: Build ct-stream-filter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ct-stream-filter
        uses: docker/build-push-action@v6
        with:
          context: ./ct-stream-filter
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/ct-stream-filter:latest
            ${{ env.IMAGE_PREFIX }}/ct-stream-filter:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ct-watcher:
    name: Build ct-watcher
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ct-watcher
        uses: docker/build-push-action@v6
        with:
          context: ./ct-watcher
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/ct-watcher:latest
            ${{ env.IMAGE_PREFIX }}/ct-watcher:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: [build-certstream, build-ct-stream-filter, build-ct-watcher]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'SCRIPT'
          set -e
          DEPLOY_DIR="${HOME}/DNSStudy-CTMonitor"
          if [ -d "$DEPLOY_DIR" ]; then
            cd "$DEPLOY_DIR"
            git fetch origin
            git reset --hard origin/main
          else
            git clone https://github.com/bkeitht/DNSStudy-CTMonitor.git "$DEPLOY_DIR"
          fi
          SCRIPT

      - name: Generate .env
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          DNSSTUDY_API_URL: ${{ secrets.DNSSTUDY_API_URL }}
        run: |
          # Use printf for safe handling of passwords with special characters
          {
            printf 'POSTGRES_HOST=%s\n' "${POSTGRES_HOST:-dnsstudy-postgres}"
            printf 'POSTGRES_PORT=%s\n' "${POSTGRES_PORT:-5432}"
            printf 'POSTGRES_DB=%s\n' "${POSTGRES_DB:-dnsstudy}"
            printf 'POSTGRES_USER=%s\n' "${POSTGRES_USER:-dnsstudy}"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'DNSSTUDY_API_URL=%s\n' "${DNSSTUDY_API_URL:-http://dnsstudy-api:8000}"
            printf 'CERTSTREAM_WS_URL=ws://certstream:8080/\n'
            printf 'PATTERN_RELOAD_INTERVAL=300\n'
            printf 'HEARTBEAT_INTERVAL=60\n'
            printf 'WATCHLIST_REFRESH_INTERVAL=300\n'
          } | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
                'cat > ~/DNSStudy-CTMonitor/.env && chmod 600 ~/DNSStudy-CTMonitor/.env'

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'SCRIPT'
          set -e
          cd ~/DNSStudy-CTMonitor

          # Ensure docker network exists
          docker network create dnsstudy-network 2>/dev/null || true

          docker compose build
          docker compose up -d
          echo "--- Health check ---"
          sleep 10
          docker compose ps
          SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
